<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>для тебя:3</title>
    <style>
        /* --- 1. CSS Стилізація (Дизайн) --- */
        :root {
            --bg-color: #030310; /* Глубокий космос */
            --star-color: #fff;
            --star-glow: rgba(255, 255, 255, 0.8);
            --line-color: #ffcccc; /* Нежно-розовая линия */
            --heart-particle-color: #ff4d6d; /* Яркий цвет сердечек */
            --text-fill-color: rgba(255, 77, 109, 0.7);
            --accent-color: #ff4d6d;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Запрещаем скролл */
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1a1a3a 0%, #030310 100%);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Важно для тача */
        }

        /* Инструкция */
        #instruction {
            position: absolute;
            top: 15%;
            width: 100%;
            text-align: center;
            font-weight: 200;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 1s ease-out;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            pointer-events: none;
            z-index: 10;
        }

        /* Контейнер для SVG (звезд и линий) */
        #svg-container {
            position: absolute;
            width: 350px; /* Фиксированный размер для предсказуемости */
            height: 350px;
            z-index: 5;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* Точки-звезды */
        .star {
            fill: var(--star-color);
            opacity: 0; /* Скрыты изначально */
            filter: drop-shadow(0 0 4px var(--star-glow));
            transform-box: fill-box;
            transform-origin: center;
            transition: opacity 0.5s ease-out, transform 0.3s ease-out;
        }

        .star.appeared {
            opacity: 1;
            animation: flicker 2s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* Линии, которые рисует пользователь */
        .drawing-line {
            stroke: var(--line-color);
            stroke-width: 3;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px var(--line-color));
            fill: none;
        }

        /* Временная линия от последней точки до пальца */
        #temp-line {
            stroke: rgba(255, 204, 204, 0.4);
            stroke-dasharray: 5, 5;
        }

        /* Холст для взрыва сердечек (Canvas) */
        #heart-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4; /* Под SVG */
            pointer-events: none;
        }

        /* Заполнение сердца текстом */
        #text-fill-mask {
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            z-index: 6; /* Поверх всего */
        }

        .love-text {
            fill: var(--text-fill-color);
            font-size: 8px;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        /* --- Финальное модальное окно --- */
        #final-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s, visibility 0.8s;
            z-index: 20;
        }

        #final-modal.show {
            opacity: 1;
            visibility: visible;
        }

        #modal-content {
            background-color: #0a0a20;
            border: 2px solid var(--accent-color);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 77, 109, 0.5);
            transform: scale(0.7);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 80%;
        }

        #final-modal.show #modal-content {
            transform: scale(1);
        }

        #modal-message {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(255, 77, 109, 0.8);
        }

        #modal-submessage {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }

        #restart-btn {
            background-color: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
        }
        #restart-btn:hover {
            background-color: var(--accent-color);
            color: white;
        }

    </style>
</head>
<body>

    <div id="instruction">Соедини звезды котик...</div>

    <!-- 2. SVG слой для звездного сердца -->
    <div id="svg-container">
        <svg viewBox="0 0 100 100" id="heart-svg">
            <!-- Группа для готовых линий -->
            <g id="lines-group"></g>
            <!-- Временная линия за пальцем -->
            <line id="temp-line" x1="0" y1="0" x2="0" y2="0" class="drawing-line" style="display:none;"></line>
            <!-- Точки-звезды (координаты сердца) -->
            <circle class="star" cx="50" cy="20" r="1.5" data-id="0"></circle>
            <circle class="star" cx="65" cy="15" r="1.5" data-id="1"></circle>
            <circle class="star" cx="80" cy="20" r="1.5" data-id="2"></circle>
            <circle class="star" cx="85" cy="35" r="1.5" data-id="3"></circle>
            <circle class="star" cx="75" cy="55" r="1.5" data-id="4"></circle>
            <circle class="star" cx="50" cy="80" r="1.5" data-id="5"></circle>
            <circle class="star" cx="25" cy="55" r="1.5" data-id="6"></circle>
            <circle class="star" cx="15" cy="35" r="1.5" data-id="7"></circle>
            <circle class="star" cx="20" cy="20" r="1.5" data-id="8"></circle>
            <circle class="star" cx="35" cy="15" r="1.5" data-id="9"></circle>
        </svg>
    </div>

    <!-- 3. Canvas слой для "БАХ" (эффект взрыва) -->
    <canvas id="heart-canvas"></canvas>

    <!-- 4. SVG маска для заполнения "I love you" -->
    <svg id="text-fill-mask" viewBox="0 0 100 100">
        <defs>
            <path id="heart-path" d="M50,80 C50,80 85,55 85,35 C85,20 80,15 65,15 C55,15 50,20 50,20 C50,20 45,15 35,15 C20,15 15,20 15,35 C15,55 50,80 50,80 Z" />
            <clipPath id="clip-heart">
                <use xlink:href="#heart-path" />
            </clipPath>
        </defs>
        
        <g clip-path="url(#clip-heart)">
            <!-- Ряд бегущего текста -->
            <text class="love-text" x="0" y="20"></text>
            <text class="love-text" x="0" y="30"></text>
            <text class="love-text" x="0" y="40"></text>
            <text class="love-text" x="0" y="50"></text>
            <text class="love-text" x="0" y="60"></text>
            <text class="love-text" x="0" y="70"></text>
        </g>
    </svg>

    <!-- 5. Финальное модальное окно -->
    <div id="final-modal">
        <div id="modal-content">
            <div id="modal-message">сладких снов котик :3</div>
            <div id="modal-submessage">надеюсь, это тебя улыбнуло ❤️</div>
            <button id="restart-btn">Повторить?</button>
        </div>
    </div>

    <!-- --- 6. JAVASCRIPT ЛОГИКА --- -->
    <script>
        // --- Настройки и переменные ---
        const stars = document.querySelectorAll('.star');
        const instruction = document.getElementById('instruction');
        const svgContainer = document.getElementById('svg-container');
        const linesGroup = document.getElementById('lines-group');
        const tempLine = document.getElementById('temp-line');
        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');
        const loveTexts = document.querySelectorAll('.love-text');
        const modal = document.getElementById('final-modal');
        const restartBtn = document.getElementById('restart-btn');

        let currentIndex = -1; // Какую звезду нужно соединить следующей
        let drawing = false;
        let isComplete = false;
        let starPositions = []; // Кэшированные координаты звезд

        // Устанавливаем размер canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Показываем звезды по очереди
        function appearStars() {
            instruction.style.opacity = 1;
            stars.forEach((star, index) => {
                setTimeout(() => {
                    star.classList.add('appeared');
                    // Кэшируем координаты
                    starPositions.push({
                        id: parseInt(star.dataset.id),
                        cx: parseFloat(star.getAttribute('cx')),
                        cy: parseFloat(star.getAttribute('cy'))
                    });
                }, index * 300); // Разница в 300мс
            });
            currentIndex = 0; // Начинаем с нулевой
        }

        // --- Обработка ввода (Тач и Мышь) ---
        function getSvgPoint(e, element) {
            const svg = element.closest('svg');
            let p = svg.createSVGPoint();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            p.x = clientX;
            p.y = clientY;
            const ctm = svg.getScreenCTM();
            return p.matrixTransform(ctm.inverse());
        }

        function startDrawing(e) {
            if (isComplete || currentIndex !== 0) return;
            const svgPoint = getSvgPoint(e, svgContainer);
            if (checkStarCollision(svgPoint)) {
                drawing = true;
            }
        }

        function drawMove(e) {
            if (!drawing || isComplete) return;
            const svgPoint = getSvgPoint(e, svgContainer);

            // Обновляем временную пунктирную линию
            if (currentIndex > 0) {
                const lastStar = starPositions[currentIndex - 1];
                tempLine.setAttribute('x1', lastStar.cx);
                tempLine.setAttribute('y1', lastStar.cy);
                tempLine.setAttribute('x2', svgPoint.x);
                tempLine.setAttribute('y2', svgPoint.y);
                tempLine.style.display = 'block';
            }

            checkStarCollision(svgPoint);
        }

        function endDrawing() {
            drawing = false;
            tempLine.style.display = 'none';
        }

        function checkStarCollision(point) {
            if (currentIndex >= stars.length) return false;
            const targetStarPos = starPositions[currentIndex];
            
            // Расстояние от пальца до целевой звезды
            const dx = point.x - targetStarPos.cx;
            const dy = point.y - targetStarPos.cy;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 4) { // Хитбокс звезды (радиус 4 SVG единицы)
                connectStar(currentIndex);
                currentIndex++;
                if (currentIndex === stars.length) {
                    onHeartComplete();
                }
                return true;
            }
            return false;
        }

        function connectStar(index) {
            // Визуально увеличиваем звезду
            const star = stars[index];
            star.style.transform = 'scale(2)';
            setTimeout(() => star.style.transform = '', 300);

            // Если не первая звезда, рисуем линию от предыдущей
            if (index > 0) {
                const startStar = starPositions[index - 1];
                const endStar = starPositions[index];
                
                const newLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                newLine.setAttribute('x1', startStar.cx);
                newLine.setAttribute('y1', startStar.cy);
                newLine.setAttribute('x2', startStar.cx); // Начинаем из той же точки
                newLine.setAttribute('y2', startStar.cy);
                newLine.classList.add('drawing-line');
                
                linesGroup.appendChild(newLine);

                // CSS анимация прорисовки линии
                requestAnimationFrame(() => {
                    newLine.setAttribute('x2', endStar.cx);
                    newLine.setAttribute('y2', endStar.cy);
                    newLine.style.transition = 'x2 0.3s ease-out, y2 0.3s ease-out';
                });
            }
        }

        // --- Кульминация: Финал и Взрыв ---
        function onHeartComplete() {
            isComplete = true;
            instruction.style.opacity = 0;
            tempLine.style.display = 'none';

            // Ждем завершения последней линии и... БАХ!
            setTimeout(() => {
                createHeartExplosion();
                svgContainer.style.transition = 'opacity 1s';
                svgContainer.style.opacity = 0; // Плавное исчезновение контура
                fillHeartWithText();
            }, 600);
        }

        // --- Эффект взрыва (Canvas Particles) ---
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 8 + 4;
                // Случайная скорость во все стороны (взрыв)
                this.speedX = (Math.random() - 0.5) * 20;
                this.speedY = (Math.random() - 0.5) * 20;
                this.gravity = 0.15; // Легкая гравитация вниз
                this.opacity = 1;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 10;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.opacity -= 0.015; // Плавно исчезают
                this.rotation += this.rotationSpeed;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = this.opacity;
                // Рисуем маленькое сердечко
                const color = getComputedStyle(document.documentElement).getPropertyValue('--heart-particle-color').trim();
                ctx.fillStyle = color;
                drawHeartShape(ctx, 0, 0, this.size);
                ctx.fill();
                ctx.restore();
            }
        }

        function drawHeartShape(ctx, x, y, size) {
            ctx.beginPath();
            const topCurveHeight = size * 0.3;
            ctx.moveTo(x, y + topCurveHeight);
            // Верхняя левая кривая
            ctx.bezierCurveTo(x - size/2, y - topCurveHeight, x - size, y + topCurveHeight, x, y + size);
            // Верхняя правая кривая
            ctx.bezierCurveTo(x + size, y + topCurveHeight, x + size/2, y - topCurveHeight, x, y + topCurveHeight);
            ctx.closePath();
        }

        let particles = [];
        function createHeartExplosion() {
            // Находим центр SVG сердца на экране
            const rect = svgContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Создаем 50 частиц
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle(centerX, centerY));
            }
            animateParticles();
        }

        function animateParticles() {
            if (particles.length === 0) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }

        // --- Наполнение сердца бегущим текстом ---
        function fillHeartWithText() {
            const textFillSVG = document.getElementById('text-fill-mask');
            textFillSVG.style.display = 'block';
            textFillSVG.style.width = svgContainer.style.width;
            textFillSVG.style.height = svgContainer.style.height;

            // Центрируем SVG маску так же, как был контур
            const rect = svgContainer.getBoundingClientRect();
            textFillSVG.style.position = 'fixed';
            textFillSVG.style.left = rect.left + 'px';
            textFillSVG.style.top = rect.top + 'px';

            let baseText = " i love you • core kitty :3 • спокойной ночи ✨ ";
            
            loveTexts.forEach((textNode, index) => {
                let fullString = "";
                // Повторяем строку много раз, чтобы она была длинной
                for (let i = 0; i < 20; i++) fullString += baseText;
                textNode.textContent = fullString;
                
                // Эффект бегущей строки (marquee) через animate (SVG)
                const animate = document.createElementNS("http://www.w3.org/2000/svg", "animate");
                animate.setAttribute("attributeName", "x");
                // Разное смещение для эффекта "разных" строк
                animate.setAttribute("from", (index % 2 === 0 ? "0" : "-300")); 
                animate.setAttribute("to", (index % 2 === 0 ? "-300" : "0"));
                animate.setAttribute("dur", (Math.random() * 5 + 10) + "s"); // Разная скорость
                animate.setAttribute("repeatCount", "indefinite");
                textNode.appendChild(animate);
            });

            // Плавно показываем текст
            setTimeout(() => {
                loveTexts.forEach(t => t.style.opacity = 1);
            }, 100);

            // Финальный аккорд: окно
            setTimeout(showModal, 4500); // Через 4.5 сек после взрыва
        }

        function showModal() {
            modal.classList.add('show');
        }

        // --- Обработчики событий (начало) ---
        svgContainer.addEventListener('mousedown', startDrawing);
        svgContainer.addEventListener('touchstart', startDrawing);
        
        window.addEventListener('mousemove', drawMove);
        window.addEventListener('touchmove', drawMove);
        
        window.addEventListener('mouseup', endDrawing);
        window.addEventListener('touchend', endDrawing);

        restartBtn.addEventListener('click', () => location.reload());

        // Запускаем магию через полсекунды после загрузки
        window.onload = () => setTimeout(appearStars, 500);

    </script>
</body>
</html>
