<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>для тебя :3</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent-pink: #ff4d6d;
            --accent-red: #ff003c;
            --star-color: #fff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 10%, #200005 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, #200005 0%, transparent 50%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
        }

        #instruction {
            position: absolute;
            top: 12%;
            width: 100%;
            text-align: center;
            color: var(--accent-pink);
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--accent-red);
            z-index: 10;
            pointer-events: none;
        }

        #main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #heart-svg {
            width: 90vw;
            max-width: 400px;
            height: auto;
            z-index: 5;
            overflow: visible;
        }

        .star {
            fill: var(--star-color);
            filter: drop-shadow(0 0 5px var(--accent-pink));
        }

        .star.connected {
            fill: var(--accent-pink);
            transform: scale(1.5);
            filter: drop-shadow(0 0 8px var(--accent-red));
            transform-box: fill-box;
            transform-origin: center;
            transition: transform 0.2s, fill 0.2s;
        }

        .line {
            stroke: var(--accent-pink);
            stroke-width: 3;
            stroke-linecap: round;
            filter: drop-shadow(0 0 5px var(--accent-red));
            opacity: 0.7;
        }

        #temp-line {
            stroke: var(--accent-pink);
            stroke-width: 2;
            stroke-dasharray: 4;
            opacity: 0.5;
            display: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 8;
        }

        #text-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 6;
        }

        .love-path {
            fill: none;
            stroke: none;
        }

        .heart-text {
            fill: var(--accent-pink);
            font-size: 7px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 2s;
        }

        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 1s;
        }

        #modal-content {
            background: #120005;
            border: 2px solid var(--accent-red);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px var(--accent-red);
            max-width: 80%;
        }

        #modal h1 {
            color: var(--accent-pink);
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }

        #modal p {
            color: #fff;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="instruction">соедени все звезды котик :3</div>

    <div id="main-container">
        <svg id="heart-svg" viewBox="0 0 100 100">
            <g id="lines-group"></g>
            <line id="temp-line" x1="0" y1="0" x2="0" y2="0"></line>
            
            <circle class="star" cx="50" cy="25" r="3" data-id="0"></circle>
            <circle class="star" cx="65" cy="18" r="3" data-id="1"></circle>
            <circle class="star" cx="82" cy="25" r="3" data-id="2"></circle>
            <circle class="star" cx="85" cy="45" r="3" data-id="3"></circle>
            <circle class="star" cx="50" cy="85" r="3" data-id="4"></circle>
            <circle class="star" cx="15" cy="45" r="3" data-id="5"></circle>
            <circle class="star" cx="18" cy="25" r="3" data-id="6"></circle>
            <circle class="star" cx="35" cy="18" r="3" data-id="7"></circle>
            <circle class="star" cx="49" cy="24" r="3" data-id="8"></circle>
        </svg>

        <div id="text-overlay">
            <svg viewBox="0 0 100 100" width="400" height="400" id="fill-svg">
                <defs>
                    <clipPath id="heart-clip">
                        <path d="M50,85 C50,85 15,60 15,45 C15,30 25,20 35,20 C42,20 50,25 50,25 C50,25 58,20 65,20 C75,20 85,30 85,45 C85,60 50,85 50,85 Z" />
                    </clipPath>
                </defs>
                <g clip-path="url(#heart-clip)" id="text-rows"></g>
            </svg>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="modal">
        <div id="modal-content">
            <h1>сладких снов котик :3</h1>
            <p>ты моя любимка и лучшая подруга <3</p>
        </div>
    </div>

    <script>
        const stars = Array.from(document.querySelectorAll('.star'));
        const svg = document.getElementById('heart-svg');
        const tempLine = document.getElementById('temp-line');
        const linesGroup = document.getElementById('lines-group');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('modal');
        const instruction = document.getElementById('instruction');

        let connectedStars = [];
        let isDragging = false;
        let completed = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function getCoords(e) {
            const pt = svg.createSVGPoint();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            pt.x = clientX;
            pt.y = clientY;
            return pt.matrixTransform(svg.getScreenCTM().inverse());
        }

        function startDrag(e) {
            if (completed) return;
            const pos = getCoords(e);
            const firstStar = stars[0];
            const cx = parseFloat(firstStar.getAttribute('cx'));
            const cy = parseFloat(firstStar.getAttribute('cy'));
            
            if (Math.hypot(pos.x - cx, pos.y - cy) < 12) {
                isDragging = true;
                connectedStars = [0];
                firstStar.classList.add('connected');
                if (e.cancelable) e.preventDefault();
            }
        }

        function moveDrag(e) {
            if (!isDragging || completed) return;
            if (e.cancelable) e.preventDefault();
            
            const pos = getCoords(e);
            const lastIdx = connectedStars[connectedStars.length - 1];
            const lastStar = stars[lastIdx];
            
            tempLine.setAttribute('x1', lastStar.getAttribute('cx'));
            tempLine.setAttribute('y1', lastStar.getAttribute('cy'));
            tempLine.setAttribute('x2', pos.x);
            tempLine.setAttribute('y2', pos.y);
            tempLine.style.display = 'block';

            const nextIdx = connectedStars.length;
            if (nextIdx < stars.length) {
                const nextStar = stars[nextIdx];
                const nx = parseFloat(nextStar.getAttribute('cx'));
                const ny = parseFloat(nextStar.getAttribute('cy'));
                
                if (Math.hypot(pos.x - nx, pos.y - ny) < 12) {
                    connectedStars.push(nextIdx);
                    nextStar.classList.add('connected');
                    
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute('x1', lastStar.getAttribute('cx'));
                    line.setAttribute('y1', lastStar.getAttribute('cy'));
                    line.setAttribute('x2', nextStar.getAttribute('cx'));
                    line.setAttribute('y2', nextStar.getAttribute('cy'));
                    line.classList.add('line');
                    linesGroup.appendChild(line);

                    if (connectedStars.length === stars.length) {
                        finish();
                    }
                }
            }
        }

        function endDrag(e) {
            if (!isDragging || completed) return;
            isDragging = false;
            tempLine.style.display = 'none';
            
            if (connectedStars.length < stars.length) {
                connectedStars = [];
                linesGroup.innerHTML = '';
                stars.forEach(s => s.classList.remove('connected'));
            }
        }

        svg.addEventListener('mousedown', startDrag);
        svg.addEventListener('touchstart', startDrag, {passive: false});
        
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('touchmove', moveDrag, {passive: false});
        
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        function finish() {
            completed = true;
            isDragging = false;
            tempLine.style.display = 'none';
            instruction.style.opacity = 0;

            setTimeout(() => {
                bang();
                svg.style.transition = 'opacity 1s';
                svg.style.opacity = 0;
                showLoveText();
            }, 400);
        }

        let particles = [];
        function bang() {
            const x = window.innerWidth / 2;
            const y = window.innerHeight / 2;
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    size: Math.random() * 5 + 2,
                    color: Math.random() > 0.5 ? '#ff4d6d' : '#ff003c',
                    alpha: 1
                });
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.01;
                ctx.globalAlpha = Math.max(0, p.alpha);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                if (p.alpha <= 0) particles.splice(i, 1);
            });
            if (particles.length > 0) requestAnimationFrame(animate);
        }

        function showLoveText() {
            const overlay = document.getElementById('text-overlay');
            const rows = document.getElementById('text-rows');
            overlay.style.display = 'flex';
            
            for (let i = 0; i < 15; i++) {
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute('x', '-50');
                text.setAttribute('y', i * 7 + 5);
                text.classList.add('heart-text');
                text.textContent = "I LOVE YOU • ".repeat(10);
                
                const anim = document.createElementNS("http://www.w3.org/2000/svg", "animate");
                anim.setAttribute("attributeName", "x");
                anim.setAttribute("from", i % 2 === 0 ? "-50" : "0");
                anim.setAttribute("to", i % 2 === 0 ? "0" : "-50");
                anim.setAttribute("dur", "4s");
                anim.setAttribute("repeatCount", "indefinite");
                
                text.appendChild(anim);
                rows.appendChild(text);
                setTimeout(() => text.style.opacity = 1, i * 100);
            }

            setTimeout(() => {
                modal.style.display = 'flex';
                setTimeout(() => modal.style.opacity = 1, 100);
            }, 3500);
        }
    </script>
</body>
</html>
