<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaWiWorld - Pro Admin Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }
        body { background: #050507; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #6c5ce7; border-radius: 3px; }
        
        .glass-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .glass-btn:hover { background: #6c5ce7; border-color: #6c5ce7; }
        .glass-btn.danger { color: #ff7675; border-color: rgba(255, 118, 117, 0.3); }
        .glass-btn.danger:hover { background: #ff7675; color: #fff; }

        input[type="text"], input[type="number"], textarea { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px 15px; border-radius: 8px; outline: none; transition: 0.2s; font-size: 0.95rem; }
        input:focus, textarea:focus { border-color: #6c5ce7; background: rgba(255,255,255,0.08); }
        
        .left-panel { width: 55%; height: 100%; overflow-y: auto; padding: 30px; border-right: 1px solid rgba(255,255,255,0.05); }
        .right-panel { width: 45%; height: 100%; display: flex; flex-direction: column; padding: 30px; background: rgba(20, 20, 25, 0.4); }

        h1 { font-size: 2rem; margin-bottom: 25px; color: #fff; }
        h2 { font-size: 1.2rem; margin-bottom: 15px; color: #a29bfe; }

        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .meta-group { display: flex; flex-direction: column; gap: 6px; }
        .meta-group label { font-size: 0.8rem; color: #b2bec3; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .lyric-row { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .lyric-row.active-row { border-color: #6c5ce7; box-shadow: 0 0 15px rgba(108, 92, 231, 0.2); background: rgba(108, 92, 231, 0.05); }
        .time-input { width: 90px !important; text-align: center; font-weight: 700; color: #a29bfe !important; font-variant-numeric: tabular-nums; }

        .player-box { background: rgba(0,0,0,0.5); border: 1px solid rgba(108, 92, 231, 0.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .player-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .time-display { font-size: 1.8rem; font-weight: 700; font-variant-numeric: tabular-nums; display: flex; align-items: baseline; }
        .time-ms { font-size: 1.1rem; color: #a29bfe; margin-left: 2px; }
        .time-total { font-size: 1rem; color: #636e72; margin-left: 10px; }
        
        .player-controls { display: flex; align-items: center; gap: 15px; }
        .play-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #6c5ce7; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
        .play-btn:hover { background: #a29bfe; transform: scale(1.05); }
        
        .slider-container { flex-grow: 1; display: flex; align-items: center; }
        #cp-slider { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; outline: none; cursor: pointer; }
        #cp-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        .file-upload-wrapper { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        input[type="file"] { display: none; }
        .file-upload-btn { background: rgba(108, 92, 231, 0.1); border: 1px dashed #6c5ce7; color: #a29bfe; padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; flex-grow: 1; font-weight: 600; transition: 0.2s; }
        .file-upload-btn:hover { background: rgba(108, 92, 231, 0.2); }

        .preview-box { flex-grow: 1; background: #050507; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; margin-bottom: 20px; position: relative; }
        .preview-line { font-size: 1.1rem; color: #636e72; transition: 0.2s; text-align: center; padding: 8px 0; }
        .preview-line.active { color: #fff; font-size: 1.4rem; font-weight: 700; transform: scale(1.05); }

        #json-output { height: 120px; font-family: monospace; background: #0a0a0f; color: #00d2d3; resize: none; margin-bottom: 15px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="left-panel">
        <h1>Admin Studio</h1>
        
        <div class="meta-grid">
            <div class="meta-group"><label>ID</label><input type="text" id="s-id" placeholder="song_id"></div>
            <div class="meta-group"><label>Title</label><input type="text" id="s-title" placeholder="Song Title"></div>
            <div class="meta-group"><label>Artist</label><input type="text" id="s-artist" placeholder="Artist Name"></div>
            <div class="meta-group"><label>Album</label><input type="text" id="s-album" placeholder="Album Name"></div>
            <div class="meta-group"><label>Release Date</label><input type="text" id="s-date" placeholder="YYYY-MM-DD"></div>
            <div class="meta-group"><label>Text Author</label><input type="text" id="s-author" placeholder="Author Name"></div>
            <div class="meta-group"><label>Cover URL (JSON)</label><input type="text" id="s-cover" placeholder="../cover.png" value="../cover.png"></div>
            <div class="meta-group"><label>Audio URL (JSON)</label><input type="text" id="s-src" placeholder="../audio.mp3" value="../audio.mp3"></div>
            <div class="meta-group" style="flex-direction: row; align-items: center; margin-top: 25px;">
                <input type="checkbox" id="s-explicit" style="width: 18px; height: 18px;">
                <label style="margin-left: 8px;">Explicit Content</label>
            </div>
			<input type="hidden" id="s-added-date">
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2>Lyrics Editor</h2>
            <button id="add-lyric-btn" class="glass-btn" style="padding: 6px 12px; font-size: 0.85rem;">+ Add Line</button>
        </div>
        
        <div id="lyrics-container"></div>
    </div>

    <div class="right-panel">
        <div class="player-box">
            <div class="file-upload-wrapper">
                <label class="file-upload-btn">
                    <input type="file" id="local-audio" accept="audio/*">
                    <span id="file-name-display">📁 Load Local Audio File for Preview...</span>
                </label>
            </div>

            <div class="player-header">
                <div class="time-display">
                    <span id="cp-m">00:00</span><span class="time-ms" id="cp-ms">.000</span>
                    <span class="time-total" id="cp-total">/ 00:00.000</span>
                </div>
            </div>
            
            <div class="player-controls">
                <button id="cp-play" class="play-btn">
                    <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" width="24" height="24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <div class="slider-container">
                    <input type="range" id="cp-slider" min="0" max="100" step="0.001" value="0">
                </div>
            </div>
            <audio id="hidden-audio" style="display: none;"></audio>
        </div>

        <h2>Live Preview</h2>
        <div class="preview-box" id="preview-box"></div>

        <textarea id="json-output" readonly placeholder="JSON will be generated here..."></textarea>
        <button id="generate-btn" class="glass-btn" style="width: 100%; justify-content: center; background: #6c5ce7; border-color: #6c5ce7;">Generate JSON & Copy</button>
    </div>

    <script>
        const lyricsContainer = document.getElementById('lyrics-container');
        const hiddenAudio = document.getElementById('hidden-audio');
        const localAudioInput = document.getElementById('local-audio');
        const fileNameDisplay = document.getElementById('file-name-display');
        
        const playBtn = document.getElementById('cp-play');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const slider = document.getElementById('cp-slider');
        const timeM = document.getElementById('cp-m');
        const timeMs = document.getElementById('cp-ms');
        const timeTotal = document.getElementById('cp-total');
        const previewBox = document.getElementById('preview-box');

        let isPlaying = false;
        let animationId;
		
		document.getElementById('s-added-date').value = new Date().toISOString().split('T')[0];
		
        function formatTime(sec) {
            if (isNaN(sec)) return { m: "00:00", ms: ".000" };
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = Math.floor(sec % 60).toString().padStart(2, '0');
            const ms = Math.floor((sec % 1) * 1000).toString().padStart(3, '0');
            return { m: `${m}:${s}`, ms: `.${ms}` };
        }

        localAudioInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameDisplay.innerText = `🎵 ${file.name}`;
                hiddenAudio.src = URL.createObjectURL(file);
                hiddenAudio.load();
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
            }
        });

        hiddenAudio.addEventListener('loadedmetadata', () => {
            slider.max = hiddenAudio.duration;
            const t = formatTime(hiddenAudio.duration);
            timeTotal.innerText = `/ ${t.m}${t.ms}`;
        });

        function updateUI() {
            if (!hiddenAudio.paused) {
                slider.value = hiddenAudio.currentTime;
                const t = formatTime(hiddenAudio.currentTime);
                timeM.innerText = t.m;
                timeMs.innerText = t.ms;
                syncPreview(hiddenAudio.currentTime);
                animationId = requestAnimationFrame(updateUI);
            }
        }

        playBtn.addEventListener('click', () => {
            if (!hiddenAudio.src) return alert("Please load an audio file first!");
            if (hiddenAudio.paused) {
                hiddenAudio.play();
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
                animationId = requestAnimationFrame(updateUI);
            } else {
                hiddenAudio.pause();
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                cancelAnimationFrame(animationId);
            }
        });

        slider.addEventListener('input', (e) => {
            hiddenAudio.currentTime = e.target.value;
            const t = formatTime(hiddenAudio.currentTime);
            timeM.innerText = t.m;
            timeMs.innerText = t.ms;
            syncPreview(hiddenAudio.currentTime);
        });

        document.getElementById('add-lyric-btn').addEventListener('click', () => {
            const row = document.createElement('div');
            row.className = 'lyric-row';
            row.innerHTML = `
                <button type="button" class="glass-btn set-time-btn" style="padding: 6px 10px; font-size: 0.8rem;">⏱</button>
                <input type="number" step="0.001" class="time-input" value="0.000">
                <input type="text" class="text-orig" placeholder="Lyrics line..." style="flex:2;">
                <label style="font-size:0.75rem; color:#b2bec3; display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" class="kids-toggle"> Kids
                </label>
                <input type="text" class="text-kids" placeholder="Kids lyrics" style="flex:1; display:none;">
                <button type="button" class="glass-btn danger rm-btn" style="padding: 6px 10px;">X</button>
            `;

            row.querySelector('.kids-toggle').addEventListener('change', (e) => {
                row.querySelector('.text-kids').style.display = e.target.checked ? 'block' : 'none';
                buildPreview();
            });

            row.querySelector('.set-time-btn').addEventListener('click', () => {
                row.querySelector('.time-input').value = hiddenAudio.currentTime.toFixed(3);
                buildPreview();
            });

            row.querySelector('.rm-btn').addEventListener('click', () => {
                row.remove();
                buildPreview();
            });

            row.querySelectorAll('input').forEach(i => i.addEventListener('input', buildPreview));
            lyricsContainer.appendChild(row);
            buildPreview();
        });

        function buildPreview() {
            const rows = Array.from(document.querySelectorAll('.lyric-row'));
            const data = rows.map((row, idx) => ({
                t: parseFloat(row.querySelector('.time-input').value) || 0,
                text: row.querySelector('.text-orig').value || "...",
                idx: idx
            })).sort((a, b) => a.t - b.t);

            previewBox.innerHTML = '';
            data.forEach(d => {
                const el = document.createElement('div');
                el.className = 'preview-line';
                el.dataset.t = d.t;
                el.dataset.idx = d.idx;
                el.innerText = d.text;
                previewBox.appendChild(el);
            });
        }

        function syncPreview(time) {
            const lines = Array.from(previewBox.querySelectorAll('.preview-line'));
            let active = -1;
            for (let i = 0; i < lines.length; i++) {
                if (time >= parseFloat(lines[i].dataset.t)) active = i;
                else break;
            }

            lines.forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.lyric-row').forEach(r => r.classList.remove('active-row'));

            if (active !== -1) {
                const el = lines[active];
                el.classList.add('active');
                previewBox.scrollTo({ top: el.offsetTop - previewBox.clientHeight / 2 + el.clientHeight / 2, behavior: 'smooth' });
                
                const rows = document.querySelectorAll('.lyric-row');
                if (rows[el.dataset.idx]) rows[el.dataset.idx].classList.add('active-row');
            }
        }

        document.getElementById('generate-btn').addEventListener('click', () => {
            const song = {
                id: document.getElementById('s-id').value || "song_id",
                title: document.getElementById('s-title').value || "Untitled",
                artist: document.getElementById('s-artist').value || "Unknown Artist",
                album: document.getElementById('s-album').value,
                releaseDate: document.getElementById('s-date').value,
				addedDate: document.getElementById('s-added-date').value,
                textAuthor: document.getElementById('s-author').value,
                explicit: document.getElementById('s-explicit').checked,
                cover: document.getElementById('s-cover').value,
                src: document.getElementById('s-src').value
            };

            const rows = Array.from(document.querySelectorAll('.lyric-row'))
                .map(r => {
                    const time = parseFloat(r.querySelector('.time-input').value) || 0;
                    const text = r.querySelector('.text-orig').value;
                    const kids = r.querySelector('.kids-toggle').checked ? r.querySelector('.text-kids').value : null;
                    return kids && kids.trim() !== "" ? { time, text, kidsText: kids } : { time, text };
                })
                .sort((a, b) => a.time - b.time);

            song.lyrics = rows.length ? rows : false;

            const out = document.getElementById('json-output');
            out.value = ",\n" + JSON.stringify(song, null, 4);
            out.select();
            document.execCommand('copy');
        });
    </script>
</body>
</html>
